services:
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rag_finance
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: rag-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    ports:
      - "9001:9000"

  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: rag-backend
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql+pymysql://rag:rag@mysql:3306/rag_finance?charset=utf8mb4
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag
      MYSQL_DB: rag_finance
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: finance_policy_chunks
      VECTOR_BACKEND: milvus
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-hash}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-24}
      EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-2}
      EMBEDDING_RETRY_BACKOFF_MS: ${EMBEDDING_RETRY_BACKOFF_MS:-300}
      EMBEDDING_MAX_CONNECTIONS: ${EMBEDDING_MAX_CONNECTIONS:-50}
      EMBEDDING_MAX_KEEPALIVE_CONNECTIONS: ${EMBEDDING_MAX_KEEPALIVE_CONNECTIONS:-20}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_MODEL: ${EMBEDDING_API_MODEL:-}
      RUNTIME_PROFILE: prod_qwen
      QWEN_API_BASE: ${QWEN_API_BASE:-http://qwen:8000/v1}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_CHAT_MODEL: ${QWEN_CHAT_MODEL:-Qwen3}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL:-text-embedding-v1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-35}
      RAG_CONTEXT_CHUNKS: ${RAG_CONTEXT_CHUNKS:-4}
      RAG_CONTEXT_MAX_CHARS_PER_CHUNK: ${RAG_CONTEXT_MAX_CHARS_PER_CHUNK:-650}
      RAG_CONTEXT_MAX_TOTAL_CHARS: ${RAG_CONTEXT_MAX_TOTAL_CHARS:-2200}
      VECTOR_NPROBE: ${VECTOR_NPROBE:-16}
      VECTOR_NLIST: ${VECTOR_NLIST:-128}
      OCR_LANG: chi_sim+eng
    ports:
      - "8000:8000"
    volumes:
      - ../backend/data/raw:/app/data/raw
      - ../backend/data/logs:/app/data/logs
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_started

volumes:
  mysql_data:
